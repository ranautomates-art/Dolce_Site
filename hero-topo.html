<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolce | Artisan Ice Cream</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="hero-topo.css">
</head>
<body class="halide-body">
    <!-- SVG Filter for Grain Texture -->
    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
    </svg>

    <!-- Grain Overlay -->
    <div class="halide-grain"></div>

    <!-- Interface Grid Overlay -->
    <div class="interface-grid">
        <!-- Top Bar -->
        <div class="brand-name">DOLCE</div>
        <div class="meta-info">
            <div>SANDY HOOK, CT</div>
            <div>ARTISAN CRAFTED</div>
        </div>

        <!-- Hero Title -->
        <h1 class="hero-title">
            HANDCRAFTED<br />
            GELATO
        </h1>

        <!-- Bottom Bar -->
        <div class="bottom-grid">
            <div class="archive-info">
                <p>[ EST. 2009 ]</p>
                <p>ITALIAN TRADITION & PREMIUM INGREDIENTS</p>
            </div>
            <a href="sweets.html" class="cta-button">EXPLORE FLAVORS</a>
        </div>
    </div>

    <!-- 3D Viewport -->
    <div class="viewport">
        <div class="canvas-3d" id="canvas-3d">
            <!-- Layer 1: Base Image (Your first image - chocolate milkshake) -->
            <div class="layer layer-1" id="layer-1"></div>

            <!-- Layer 2: Middle Image (Your second image - ice cream cone) -->
            <div class="layer layer-2" id="layer-2"></div>

            <!-- Layer 3: Top Image (Blend) -->
            <div class="layer layer-3" id="layer-3"></div>

            <!-- Topographical Contour Lines -->
            <div class="contours"></div>
        </div>
    </div>

    <!-- Scroll Hint Animation -->
    <div class="scroll-hint"></div>

    <script src="hero-topo.js"></script>
</body>
</html>
