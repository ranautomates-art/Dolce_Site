# Netlify Configuration for Dolce Website
# ========================================

[build]
  # No build command needed - this is a static HTML site
  command = ""

  # Publish from the dolce-website directory (where index.html and all assets are)
  publish = "dolce-website"

# Ensure all file types are served correctly
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

# Serve image files with proper caching
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.avif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
